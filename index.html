  <h2>🏀 Swipe Basketball</h2>
  <p>Swipe to shoot and score!</p>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Stock Ultra Glass UI</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>

<body>

<div id="loginPage" class="center fade">
<h1 class="glow"> Stock Ultra</h1>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;" class="fade">
<div class="grid">

<div class="card glass"><h3> Balance</h3><h2 id="balance"></h2></div>

<div class="card glass">
  <h3>Market</h3>

  <div class="stock" data-company="GOOGL">
    <h4>Google (GOOGL)</h4>
    <h2 id="price-GOOGL">£100</h2>
    <canvas id="chart-GOOGL" width="300" height="150"></canvas>
    <button class="trade-btn">Buy</button>
    <button class="trade-btn">Sell</button>
  </div>

  <div class="stock" data-company="AAPL">
    <h4>Apple (AAPL)</h4>
    <h2 id="price-AAPL">£200</h2>
    <canvas id="chart-AAPL" width="300" height="150"></canvas>
    <button class="trade-btn">Buy</button>
    <button class="trade-btn">Sell</button>
  </div>

  <div class="stock" data-company="MSFT">
    <h4>Microsoft (MSFT)</h4>
    <h2 id="price-MSFT">£150</h2>
    <canvas id="chart-MSFT" width="300" height="150"></canvas>
    <button class="trade-btn">Buy</button>
    <button class="trade-btn">Sell</button>
  </div>

  <div class="stock" data-company="AMZN">
    <h4>Amazon (AMZN)</h4>
    <h2 id="price-AMZN">£300</h2>
    <canvas id="chart-AMZN" width="300" height="150"></canvas>
    <button class="trade-btn">Buy</button>
    <button class="trade-btn">Sell</button>
  </div>

  <div class="stock" data-company="TSLA">
    <h4>Tesla (TSLA)</h4>
    <h2 id="price-TSLA">£250</h2>
    <canvas id="chart-TSLA" width="300" height="150"></canvas>
    <button class="trade-btn">Buy</button>
    <button class="trade-btn">Sell</button>
  </div>

</div>

<div class="card glass">
<h3> Trade</h3>
<input id="tradeAmount" type="number">
<button onclick="buy()">Buy</button>
<button onclick="sell()">Sell</button>
</div>

<div class="card glass">
<h3> Bank</h3>
<input id="bankAmt">
<button onclick="deposit()">Deposit</button>
<button onclick="withdraw()">Withdraw</button>
<p id="bank"></p>
</div>

<div class="card glass">
<h3> Send Money</h3>
<input id="payUser">
<input id="payAmount">
<button onclick="sendMoney()">Send</button>
</div>

<div class="card glass">
<h3>️ Delete</h3>
<button onclick="confirmDelete()">Delete</button>
</div>

<div class="card glass">
<h3> Leaderboard 👑</h3>
<div id="leaderboard"></div>
</div>

<div class="card glass">
<h3> Chat</h3>
<div id="chatBox"></div>
<input id="chatInput">
<button onclick="sendChat()">Send</button>
</div>

</div>
</div>

<div id="adminBtn">👑</div>

<div id="adminPanel" class="glass">
<input id="adminUser">
<button onclick="banUser()">Ban</button>
<button onclick="giveMoney()">Give</button>
<button onclick="closeAdmin()">Close</button>
</div>

<script src="script.js"></script>

</body>
</html>
